name: Build ZMK firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [nice_nano_v2]
        shield: [mm]
    steps:
      - uses: actions/checkout@v4
      - uses: zmkfirmware/zmk/.github/actions/build-user-config@v1
        with:
          board: ${{ matrix.board }}
          shield: ${{ matrix.shield }}