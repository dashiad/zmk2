name: Build ZMK firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: zmkfirmware/zmk/.github/actions/build-user-config@v1
        with:
          board: nice_nano_v2
          shield: mm